name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  sentinel-fmt-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4.1.5
      - name: Install Sentinel
        uses: hashicorp/setup-sentinel@v1
        with:
          version: "0.26.4"
      - name: Sentinel Format
        run: |
          find "$GITHUB_WORKSPACE/policies" -type f -path "*/test/*.hcl" -exec sed -i 's|plugins/darwin/arm64|plugins/linux/amd64|g' {} +
          sentinel fmt -check=true $(find . -name "*.sentinel" -type f)
      - name: Sentinel test
        run: |
          sentinel test -verbose $(find . -name "*.sentinel" -type f ! -path "*/mocks/*" ! -path "*/example/*" ! -path "*/modules/*")
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v4.1.5
      - name: Docs presence per policy
        run: bash scripts/check-docs-presence.sh
      - name: sentinel.hcl sources exist
        run: bash scripts/check-hcl-sources.sh
      - name: NIST mapping table complete
        run: bash scripts/check-nist-mapping.sh
